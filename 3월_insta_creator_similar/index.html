<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인스타그램 크리에이터 유사도 분석</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 28px;
      color: #1d1d1f;
    }

    .input-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .input-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .input-card label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .input-card input, .input-card textarea {
      width: 100%;
      border: 1.5px solid #e0e0e5;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }

    .input-card input:focus, .input-card textarea:focus {
      border-color: #0071e3;
    }

    .input-card .hint {
      font-size: 12px;
      color: #aeaeb2;
      margin-top: 6px;
    }

    .btn-compare {
      display: block;
      width: 100%;
      padding: 13px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 32px;
    }

    .btn-compare:hover { background: #0077ed; }
    .btn-compare:disabled { background: #aeaeb2; cursor: default; }

    /* 기준 대상 정보 */
    .ref-info-box {
      background: #fff;
      border-radius: 14px;
      padding: 18px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }

    .ref-info-box h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #1d1d1f;
    }

    .ref-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ref-field {
      background: #f5f5f7;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .ref-field .field-name {
      font-size: 11px;
      font-weight: 600;
      color: #6e6e73;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .ref-field .field-values {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .tag-ref { background: #e8f0fe; color: #1a56db; }
    .tag-match { background: #d1fae5; color: #065f46; }
    .tag-miss { background: #fee2e2; color: #991b1b; }

    /* 결과 목록 */
    .results-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .result-card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .result-card.not-found {
      opacity: 0.6;
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .result-id {
      font-size: 15px;
      font-weight: 700;
    }

    .insta-link {
      font-size: 12px;
      color: #0071e3;
      text-decoration: none;
      margin-left: 8px;
      font-weight: 500;
    }

    .insta-link:hover { text-decoration: underline; }

    .score-badge {
      font-size: 14px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .score-5 { background: #d1fae5; color: #065f46; }
    .score-4 { background: #d1fae5; color: #065f46; }
    .score-3 { background: #fef3c7; color: #92400e; }
    .score-2 { background: #fee2e2; color: #991b1b; }
    .score-1 { background: #fee2e2; color: #991b1b; }
    .score-0 { background: #fee2e2; color: #991b1b; }

    .field-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 80px 1fr 1fr;
      align-items: start;
      gap: 10px;
      font-size: 13px;
    }

    .field-row-label {
      font-weight: 600;
      color: #6e6e73;
      padding-top: 3px;
      font-size: 12px;
    }

    .field-row-values {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .field-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding-top: 3px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-match { background: #10b981; }
    .dot-miss  { background: #ef4444; }

    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      color: #aeaeb2;
      font-size: 14px;
      padding: 32px;
    }

    /* 추출기 */
    .extractor-section {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 32px;
    }

    .extractor-section h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #1d1d1f;
    }

    .extractor-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .extractor-section textarea {
      width: 100%;
      border: 1.5px solid #e0e0e5;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: "Menlo", "Monaco", monospace;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
    }

    .extractor-section textarea:focus { border-color: #0071e3; }

    .extractor-output-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .extractor-output {
      width: 100%;
      background: #f5f5f7;
      border: 1.5px solid #e0e0e5;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: "Menlo", "Monaco", monospace;
      color: #1d1d1f;
      word-break: break-all;
      min-height: 80px;
      resize: vertical;
    }

    .extractor-actions {
      display: flex;
      gap: 8px;
    }

    .btn-extract {
      flex: 1;
      padding: 9px;
      background: #1d1d1f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-extract:hover { background: #3a3a3c; }

    .btn-copy {
      flex: 1;
      padding: 9px;
      background: #f5f5f7;
      color: #1d1d1f;
      border: 1.5px solid #e0e0e5;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-copy:hover { background: #e8e8ed; }

    .btn-paste {
      flex: 1;
      padding: 9px;
      background: #e8f0fe;
      color: #1a56db;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-paste:hover { background: #d2e3fc; }

    .extractor-count {
      font-size: 12px;
      color: #6e6e73;
    }
  </style>
</head>
<body>
<div class="container">

<h1>인스타그램 크리에이터 유사도 분석</h1>

<!-- user_id 추출기 -->
<div class="extractor-section">
  <h2>user_id 추출기</h2>
  <div class="extractor-row">
    <div>
      <textarea id="jsonInput" rows="8" placeholder="JSON 배열 또는 객체 붙여넣기..."></textarea>
    </div>
    <div class="extractor-output-wrap">
      <textarea class="extractor-output" id="extractedIds" rows="8" readonly placeholder="추출된 user_id가 여기에 표시됩니다"></textarea>
      <span class="extractor-count" id="extractCount"></span>
      <div class="extractor-actions">
        <button class="btn-extract" onclick="extractIds()">추출</button>
        <button class="btn-copy" onclick="copyIds()">복사</button>
        <button class="btn-paste" onclick="pasteToCompare()">비교란에 붙여넣기</button>
      </div>
    </div>
  </div>
</div>

<div class="input-section">
  <div class="input-card">
    <label>기준 대상 ID</label>
    <input type="text" id="refInput" placeholder="user_id 입력" />
  </div>
  <div class="input-card">
    <label>비교 대상 ID 목록</label>
    <textarea id="cmpInput" rows="3" placeholder="쉼표로 구분: aaaaa, bbbbb, ccccc"></textarea>
    <p class="hint">쉼표(,)로 여러 개 입력 가능</p>
  </div>
</div>

<button class="btn-compare" id="btnCompare" onclick="runCompare()">유사도 분석 실행</button>

<div id="output"></div>

<script>
const API = "http://localhost:5050";

const FIELD_ORDER = ["format", "persona", "behavior", "topic", "mood"];

async function runCompare() {
  const refId = document.getElementById("refInput").value.trim();
  const cmpRaw = document.getElementById("cmpInput").value.trim();
  const btn = document.getElementById("btnCompare");
  const out = document.getElementById("output");

  if (!refId || !cmpRaw) {
    out.innerHTML = `<div class="error-msg">기준 대상과 비교 대상을 모두 입력해주세요.</div>`;
    return;
  }

  btn.disabled = true;
  out.innerHTML = `<div class="loading">분석 중...</div>`;

  try {
    const res = await fetch(`${API}/api/compare`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ref_id: refId, compare_ids: cmpRaw }),
    });
    const data = await res.json();

    if (!res.ok) {
      out.innerHTML = `<div class="error-msg">${data.error || "오류가 발생했습니다."}</div>`;
      return;
    }

    renderResults(data);
  } catch (e) {
    out.innerHTML = `<div class="error-msg">서버에 연결할 수 없습니다. Flask 백엔드(port 5050)가 실행 중인지 확인해주세요.</div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResults(data) {
  const out = document.getElementById("output");
  let html = "";

  // 기준 대상 정보
  html += `<div class="ref-info-box">
    <h2>기준 대상: @${data.ref_id} <a class="insta-link" href="https://www.instagram.com/${data.ref_id}/" target="_blank">인스타 보기 ↗</a></h2>
    <div class="ref-fields">`;
  for (const field of FIELD_ORDER) {
    const info = data.ref_info[field];
    html += `<div class="ref-field">
      <div class="field-name">${fieldLabel(field)}</div>
      <div class="field-values">${info.map(v => `<span class="tag tag-ref">${v}</span>`).join("")}</div>
    </div>`;
  }
  html += `</div></div>`;

  // 결과
  html += `<div class="results-header">비교 결과 (${data.results.length}건)</div>`;

  // 점수 높은 순 정렬
  const sorted = [...data.results].sort((a, b) => {
    if (!a.found && !b.found) return 0;
    if (!a.found) return 1;
    if (!b.found) return -1;
    return b.score - a.score;
  });

  for (const r of sorted) {
    if (!r.found) {
      html += `<div class="result-card not-found">
        <div class="result-top">
          <span class="result-id">@${r.id} <a class="insta-link" href="https://www.instagram.com/${r.id}/" target="_blank">인스타 보기 ↗</a></span>
          <span class="score-badge score-0">데이터 없음</span>
        </div>
      </div>`;
      continue;
    }

    const scoreClass = `score-${r.score}`;
    const pct = Math.round((r.score / r.total) * 100);

    html += `<div class="result-card">
      <div class="result-top">
        <span class="result-id">@${r.id} <a class="insta-link" href="https://www.instagram.com/${r.id}/" target="_blank">인스타 보기 ↗</a></span>
        <span class="score-badge ${scoreClass}">${r.score}/${r.total} (${pct}%)</span>
      </div>
      <div class="field-rows">`;

    for (const field of FIELD_ORDER) {
      const f = r.fields[field];
      const dotClass = f.matched ? "dot-match" : "dot-miss";
      const tagClass = f.matched ? "tag-match" : "tag-miss";

      html += `<div class="field-row">
        <div class="field-row-label">${f.label}</div>
        <div class="field-row-values">
          ${f.cmp_values.map(v => {
            const isCommon = f.common.includes(v);
            return `<span class="tag ${isCommon ? "tag-match" : "tag-miss"}">${v}</span>`;
          }).join("") || '<span style="color:#aeaeb2;font-size:12px;">-</span>'}
        </div>
        <div class="field-status">
          <span class="dot ${dotClass}"></span>
          <span>${f.matched ? "일치 (" + f.common.join(", ") + ")" : "불일치"}</span>
        </div>
      </div>`;
    }

    html += `</div></div>`;
  }

  out.innerHTML = html;
}

function fieldLabel(field) {
  const map = { format: "대표유형", persona: "주인공", behavior: "유도행동", topic: "분야/주제", mood: "무드/톤" };
  return map[field] || field;
}

function extractIds() {
  const raw = document.getElementById("jsonInput").value.trim();
  if (!raw) return;

  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch {
    // 배열로 감싸서 재시도
    try { parsed = JSON.parse("[" + raw + "]"); }
    catch { alert("JSON 파싱 실패. 형식을 확인해주세요."); return; }
  }

  const items = Array.isArray(parsed) ? parsed : [parsed];
  const ids = items.map(o => o.user_id).filter(Boolean);
  document.getElementById("extractedIds").value = ids.join(", ");
  document.getElementById("extractCount").textContent = `총 ${ids.length}개`;
}

function copyIds() {
  const val = document.getElementById("extractedIds").value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.querySelector(".btn-copy");
    btn.textContent = "복사됨!";
    setTimeout(() => btn.textContent = "복사", 1500);
  });
}

function pasteToCompare() {
  const val = document.getElementById("extractedIds").value;
  if (!val) return;
  document.getElementById("cmpInput").value = val;
  document.getElementById("cmpInput").focus();
}

// Enter 키로 실행
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) runCompare();
});
</script>
</div>
</body>
</html>
