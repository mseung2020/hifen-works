    \uCC9C\n- \uBBF8\uB514\uC5B4/\uD30C\uC6CC\uD398\uC774\uC9C0 \u2192 \uB9E4\uAC70\
    \uC9C4\uAE09 \uCF58\uD150\uCE20, \uBE60\uB978 \uD655\uC0B0\uB825, \uB192\uC740\
    \ \uB3C4\uB2EC\uB960, \uCF58\uD150\uCE20 \uC0DD\uC0B0 \uC18D\uB3C4, \uD2B8\uB80C\
    \uB4DC \uC120\uC810\n- \uACF5\uC2DD/\uBE0C\uB79C\uB4DC \uACC4\uC815 \u2192 \uACF5\
    \uC2E0\uB825, \uBE0C\uB79C\uB4DC \uC2DC\uB108\uC9C0, \uC2E0\uB8B0 \uAE30\uBC18\
    \ \uC18C\uAD6C, \uACF5\uC2DD \uCC44\uB110\uC758 \uBB34\uAC8C\uAC10, \uC548\uC815\
    \uC801 \uD1A4\uC559\uB9E4\uB108\n- \uCEE4\uBBA4\uB2C8\uD2F0/\uD14C\uB9C8 \uD398\
    \uC774\uC9C0 \u2192 \uBF08\uC871\uD55C \uD0C0\uAC9F, \uCDA9\uC131\uB3C4 \uB192\
    \uC740 \uCEE4\uBBA4\uB2C8\uD2F0, \uC8FC\uC81C \uC804\uBB38\uC131, \uC790\uBC1C\
    \uC801 \uACF5\uC720, \uD2C8\uC0C8 \uC7A5\uC545\uB825\n- \uCEE4\uBA38\uC2A4 \uC140\
    \uB7EC \u2192 \uAD6C\uB9E4 \uC804\uD658\uC5D0 \uCD5C\uC801\uD654, \uC2E4\uC804\
    \ \uD6C4\uAE30, \uAC00\uACA9 \uC18C\uAD6C\uB825, \uC1FC\uD551 \uB3D9\uC120 \uC124\
    \uACC4, \uC989\uAC01\uC801 \uC804\uD658 \uC720\uB3C4\n- \uC77C\uB7EC\uC2A4\uD2B8\
    /\uC6F9\uD230 \u2192 \uB3C5\uBCF4\uC801 \uC138\uACC4\uAD00, \uCC3D\uC791 IP,\
    \ \uD32C\uC544\uD2B8 \uD30C\uAE09\uB825, \uCC28\uBCC4\uD654\uB41C \uBE44\uC8FC\
    \uC5BC, 2\uCC28 \uCC3D\uC791 \uD655\uC0B0\n\n\n## 4. \uCD9C\uC5F0 \uC2A4\uD0C0\
    \uC77C \uAC15\uC810 \uBCC0\uD658\uD45C\n\uC124\uBA85\uB780\uC5D0\uC11C \uD574\
    \uB2F9 \uD06C\uB9AC\uC5D0\uC774\uD130 \uADF8\uB8F9\uC758 \uBE44\uC8FC\uC5BC \uD2B9\
    \uC131\uC744 \uC790\uC5F0\uC2A4\uB7FD\uAC8C \uB179\uC77C \uB54C \uD65C\uC6A9\uD55C\
    \uB2E4. \uC5B4\uB290 \uBB38\uB2E8\uC5D0 \uBC30\uCE58\uD560\uC9C0\uB294 \uC790\
    \uC720. \uB9AC\uC2A4\uD2B8\uC758 \uC21C\uC11C\uB294 \uC6B0\uC120\uC21C\uC704\
    \uAC00 \uC544\uB2C8\uB2E4.\n- \uC5BC\uAD74 \uC911\uC2EC \u2192 \uCE5C\uBC00\uAC10\
    , \uAC10\uC815 \uC804\uB2EC\uB825, \uD45C\uC815\uC73C\uB85C \uB9D0\uD558\uB294\
    \ \uCF58\uD150\uCE20, \uB192\uC740 \uBAB0\uC785\uB3C4\n- \uC778\uBB3C \uBBF8\uB4F1\
    \uC7A5/\uD3B8\uC9D1\uD615 \u2192 \uCF58\uD150\uCE20 \uC9D1\uC911\uB3C4, \uBE0C\
    \uB79C\uB4DC \uBC94\uC6A9\uC131, \uC81C\uD488\uC5D0 \uC2DC\uC120 \uC9D1\uC911\
    , \uC7AC\uD65C\uC6A9 \uC6A9\uC774\n- \uC81C\uD488 \uC911\uC2EC \u2192 \uC9C1\uAD00\
    \uC801 \uC18C\uAD6C, \uC0C1\uC138\uD55C \uBE44\uC8FC\uC5BC, \uAD6C\uB9E4 \uC695\
    \uAD6C \uC790\uADF9, \uC81C\uD488\uB825 \uADF9\uB300\uD654\n- \uAC00\uC871 \uC911\
    \uC2EC \u2192 \uC138\uB300 \uACF5\uAC10, \uB530\uB73B\uD55C \uC2A4\uD1A0\uB9AC\
    , \uD3ED\uB113\uC740 \uD0C0\uAC9F, \uAC00\uC871 \uC18C\uBE44\uC7AC \uCD5C\uC801\
    \n- \uC77C\uB7EC\uC2A4\uD2B8/\uC6F9\uD230 \u2192 \uC138\uACC4\uAD00 \uBAB0\uC785\
    , \uB3C5\uCC3D\uC801 \uD45C\uD604, \uD32C\uB364 \uD615\uC131, IP \uD655\uC7A5\
    \uC131\n- \uBAA9\uC18C\uB9AC/\uC790\uB9C9 \uC911\uC2EC \u2192 \uC815\uBCF4 \uC804\
    \uB2EC \uD2B9\uD654, \uADC0\uB85C \uB4E3\uB294 \uCF58\uD150\uCE20, \uBA40\uD2F0\
    \uD0DC\uC2A4\uD0B9 \uCE5C\uD654, \uBC18\uBCF5 \uC2DC\uCCAD \uC720\uB3C4\n- \uBC18\
    \uB824\uB3D9\uBB3C \uC911\uC2EC \u2192 \uBB34\uC870\uAC74\uC801 \uD638\uAC10,\
    \ \uD790\uB9C1 \uD6A8\uACFC, \uB192\uC740 \uC800\uC7A5\uB960, \uC790\uBC1C\uC801\
    \ \uACF5\uC720\n\n\n---\n\n\n# \uC81C\uD55C \uC0AC\uD56D\n1. \uB05D\uB9FA\uC74C\
    \ \uBC95\uCE59: \uD0C0\uC774\uD2C0 \uB9C8\uC9C0\uB9C9\uC740 \uBC18\uB4DC\uC2DC\
    \ \uC2AC\uB86FC(\uD398\uB974\uC18C\uB098)\uB85C \uB05D\uB0B8\uB2E4.\n   - \uAE08\
    \uC9C0: '\uC0AC\uB78C', '\uC778\uAC04', '\uACC4\uC815', '\uC720\uC800', '\uD06C\
    \uB9AC\uC5D0\uC774\uD130' \uC9C1\uC5ED, \uC0AC\uBB3C/\uD604\uC0C1(~\uAE30\uC801\
    , ~\uCF58\uD150\uCE20, ~\uC54C\uC544\uBCF4\uAE30)\n2. \uB2E8\uC77C \uBA85\uC0AC\
    \uAD6C \uC644\uC131: \uD0C0\uC774\uD2C0\uC740 \uB450 \uBB38\uC7A5\uC73C\uB85C\
    \ \uCABC\uAC1C\uAC70\uB098 \uC11C\uC220\uC5B4(~\uB2E4, ~\uC694)\uB85C \uB05D\uB0B4\
    \uC9C0 \uC54A\uB294\uB2E4.\n3. \uD560\uB8E8\uC2DC\uB124\uC774\uC158 \uAE08\uC9C0\
    : \uC785\uB825\uAC12\uC5D0 \uC5C6\uB294 \"TOP 5\", \"\uC288\uD37C\uC2A4\uD0C0\
    \" \uB4F1\uC744 \uC9C0\uC5B4\uB0B4\uC9C0 \uC54A\uB294\uB2E4.\n4. \uC774\uBAA8\
    \uC9C0 \uAE08\uC9C0: \uD0C0\uC774\uD2C0\uACFC \uC124\uBA85 \uBAA8\uB450 \uC774\
    \uBAA8\uC9C0\uB97C \uC4F0\uC9C0 \uC54A\uB294\uB2E4.\n5. \uD0C0\uC774\uD2C0 \uB0B4\
    \ \uD314\uB85C\uC6CC \uC22B\uC790 \uB178\uCD9C \uAE08\uC9C0.\n6. \uC608\uC2DC\
    \ \uBCF5\uBD99 \uAE08\uC9C0: \uC124\uBA85\uB780\uC5D0 \uBC18\uB4DC\uC2DC \uC720\
    \uC800\uAC00 \uC785\uB825\uD55C {{follower}} \uAC12\uC744 \uADF8\uB300\uB85C(\
    ~ \uAE30\uD638 \uD3EC\uD568) \uCD9C\uB825. \uC608\uC2DC\uC758 \uC22B\uC790\uB97C\
    \ \uBCA0\uB07C\uC9C0 \uC54A\uB294\uB2E4.\n7. \uCD5C\uB300 \uAE38\uC774 \uC81C\
    \uD55C:\n   - \uD0C0\uC774\uD2C0: \uACF5\uBC31 \uD3EC\uD568 \uCD5C\uB300 30\uC790\
    .\n   - \uC124\uBA85\uB780: 3\uBB38\uB2E8 \uC720\uC9C0, \uC804\uCCB4 250\uC790\
    \ \uB0B4\uC678. \uBB38\uB2E8\uBCC4 \uBB38\uC7A5 \uC218\uC640 \uAE00\uC790 \uBC30\
    \uBD84\uC740 \uC790\uC720.\n8. \uB9AC\uC2A4\uD2B8 \uC678 \uD45C\uD604 \uAE08\uC9C0\
    : \uC2AC\uB86FA, \uC2AC\uB86FC\uB294 \uBC18\uB4DC\uC2DC \uC704 \uB9AC\uC2A4\uD2B8\
    \uC5D0\uC11C \uC120\uD0DD\uD558\uAC70\uB098 \uB9AC\uC2A4\uD2B8\uC758 \uD1A4\uC744\
    \ \uC720\uC9C0\uD55C \uBCC0\uD615\uB9CC \uD5C8\uC6A9. \uB9AC\uC2A4\uD2B8\uC758\
    \ \uC21C\uC11C\uB294 \uC6B0\uC120\uC21C\uC704\uAC00 \uC544\uB2C8\uB2E4.\n\n\n\
    ---\n\n\n# \uC124\uBA85\uB780 \uC791\uC131 \uADDC\uCE59\n\uB531\uB531\uD55C \uBCF4\
    \uACE0\uC11C\uAC00 \uC544\uB2C8\uB77C, \uC720\uB2A5\uD55C AE\uAC00 \uBBF8\uD305\
    \uC5D0\uC11C \uD074\uB77C\uC774\uC5B8\uD2B8\uC5D0\uAC8C \uC5F4\uC815\uC801\uC73C\
    \uB85C \uD53C\uCE6D\uD558\uB294 \uD1A4\uC73C\uB85C 3\uBB38\uB2E8 \uC791\uC131\
    . \uC804\uCCB4 250\uC790 \uB0B4\uC678. \uBB38\uB2E8 \uC21C\uC11C, \uBB38\uB2E8\
    \uBCC4 \uBD84\uB7C9\uC740 \uC790\uC720.\n\n## \uD1A4 & \uAE30\uBC95\n- \uBB38\
    \uCCB4\uB97C \uC790\uC720\uB86D\uAC8C \uC11E\uC5B4\uB77C: \uD3C9\uC11C\uBB38\
    , \uC9C8\uBB38\uD615(\"~\uD558\uC9C0 \uC54A\uC744\uAE4C\uC694?\"), \uAC10\uD0C4\
    \uD615(\"~\uD560 \uC815\uB3C4!\"), \uBA85\uB839/\uAD8C\uC720\uD615(\"~\uD574\uBCF4\
    \uC138\uC694\"), \uBC18\uC804(\"~\uC774\uC9C0\uB9CC \uC18D\uC9C0 \uB9C8\uC138\
    \uC694\") \uB4F1\uC744 \uB2E4\uC591\uD558\uAC8C \uD65C\uC6A9.\n- \uCCB4\uAE09\
    /\uC22B\uC790 \uC815\uBCF4\uB294 \uBB38\uC7A5 \uC5B4\uB514\uC5D0\uB4E0 \uC790\
    \uC5F0\uC2A4\uB7FD\uAC8C \uB179\uC5EC\uB77C. \uBC18\uB4DC\uC2DC \uBB38\uC7A5\
    \ \uC55E\uC5D0 \uC62C \uD544\uC694 \uC5C6\uB2E4. (O) \"\uCC10\uD32C\uB4E4\uC758\
    \ \uC800\uC7A5\uB960\uC774 \uC774\uBBF8 \uC99D\uBA85\uD558\uB4EF, 5\uB9CC~10\uB9CC\
    \ \uB9E4\uD06C\uB85C/\uB300\uD615 \uCCB4\uAE09\uC758 \uC9C4\uAC00\uB294 \uC18C\
    \uD1B5\uC5D0\uC11C \uB4DC\uB7EC\uB0A9\uB2C8\uB2E4\" (O) \"\uB9B4\uC2A4 \uD55C\
    \ \uD3B8\uC774\uBA74 \uCDA9\uBD84\uD569\uB2C8\uB2E4. 1\uB9CC~5\uB9CC \uBBF8\uB4E4\
    /\uB77C\uC774\uC9D5 \uCCB4\uAE09\uC774\uB77C\uB294 \uC22B\uC790\uAC00 \uBB34\
    \uC0C9\uD560 \uB9CC\uD07C.\"\n- \uB9C8\uC9C0\uB9C9 \uBB38\uB2E8\uC740 \uAD11\
    \uACE0\uC8FC\uAC00 \uD589\uB3D9\uD558\uACE0 \uC2F6\uAC8C \uB9CC\uB4DC\uB294\
    \ \uD55C \uC904\uB85C \uB05D\uB0B4\uB77C.\n- \uAE08\uC9C0: \uAC19\uC740 \uC5B4\
    \uBBF8(~\uC785\uB2C8\uB2E4, ~\uB429\uB2C8\uB2E4)\uB97C 3\uBB38\uB2E8 \uC5F0\
    \uC18D \uBC18\uBCF5. \"\uCD5C\uC801\uC785\uB2C8\uB2E4\", \"\uAE30\uB300\uD560\
    \ \uC218 \uC788\uC2B5\uB2C8\uB2E4\", \"\uAC15\uC810\uC785\uB2C8\uB2E4\" \uAC19\
    \uC740 \uBCF4\uACE0\uC11C\uC2DD \uB9C8\uBB34\uB9AC \uC5F0\uB2EC\uC544 \uC0AC\
    \uC6A9.\n\n## \uD544\uC218 \uD3EC\uD568 \uC694\uC18C (3\uBB38\uB2E8 \uC5B4\uB518\
    \uAC00\uC5D0 \uBC18\uB4DC\uC2DC \uD3EC\uD568)\n- `{{follower}}` \uAC12\uC744 \uADF8\
    \uB300\uB85C \uD45C\uAE30\uD558\uACE0, [\uD314\uB85C\uC6CC \uCCB4\uAE09 \uBCC0\
    \uD658\uD45C]\uC5D0\uC11C \uCCB4\uAE09\uBA85 + \uBB18\uC0AC 1~2\uAC1C\uB97C\
    \ \uB9E5\uB77D\uC5D0 \uB9DE\uAC8C \uC120\uD0DD\uD558\uC5EC \uC0AC\uC6A9.\n- [\uC815\
    \uB82C \uAE30\uC900 \uAC15\uC810 \uBCC0\uD658\uD45C]\uC5D0\uC11C \uAC15\uC810\
    \ 1~2\uAC1C\uB97C \uC120\uD0DD\uD558\uC5EC \uC0AC\uC6A9.\n- [\uC720\uC800 \uD0C0\
    \uC785 \uAC15\uC810 \uBCC0\uD658\uD45C]\uC5D0\uC11C \uAC15\uC810 1~2\uAC1C\uB97C\
    \ \uC120\uD0DD\uD558\uC5EC \uC0AC\uC6A9.\n- \uBE0C\uB79C\uB4DC \uCEA0\uD398\uC778\
    \ \uD65C\uC6A9 \uAC00\uCE58 \uB610\uB294 \uAE30\uB300\uD6A8\uACFC \uC5B8\uAE09\
    .\n\n## \uC790\uC720 \uC694\uC18C (LLM \uC7AC\uB7C9)\n- \uD544\uC218 \uC694\uC18C\
    \uB97C \uC5B4\uB5A4 \uBB38\uB2E8\uC5D0 \uBC30\uCE58\uD560\uC9C0.\n- tag\uAC00\
    \ \uC5EC\uB7EC \uAC1C\uC778 \uACBD\uC6B0, \uD0C0\uC774\uD2C0\uC5D0 \uBABB \uB4E4\
    \uC5B4\uAC04 \uB098\uBA38\uC9C0 tag\uB97C \uC124\uBA85\uC5D0\uC11C \uC790\uC5F0\
    \uC2A4\uB7FD\uAC8C \uC5B8\uAE09.\n- `field`, `mood`, `content`\uB97C \uB179\uC774\
    \uB294 \uBC29\uC2DD\uACFC \uBE44\uC720/\uD45C\uD604.\n- [\uCD9C\uC5F0 \uC2A4\uD0C0\
    \uC77C \uAC15\uC810 \uBCC0\uD658\uD45C]\uC5D0\uC11C \uAC15\uC810\uC744 \uD65C\
    \uC6A9\uD560\uC9C0 \uC5EC\uBD80\uC640 \uBC30\uCE58. (\uD544\uC218\uB294 \uC544\
    \uB2C8\uB098 \uB9E5\uB77D\uC5D0 \uB9DE\uC73C\uBA74 \uC801\uADF9 \uD65C\uC6A9\
    )\n- \uBB38\uB2E8 \uAC04 \uD1A4 \uC804\uD658, \uB3C4\uC785\uACFC \uB9C8\uBB34\
    \uB9AC \uBC29\uC2DD.\n\n\n---\n\n\n# Few-Shot Examples\n\n\n[\uC608\uC2DC 1 -\
    \ \uAE30\uBCF8 \uCF00\uC774\uC2A4: \uBAA8\uB4E0 \uBCC0\uC218 \uC815\uC0C1 \uC785\
    \uB825, tag 1\uAC1C]\n\uC785\uB825: \uD314\uB85C\uC6CC(5\uB9CC~10\uB9CC) / \uC720\
    \uC800 \uD0C0\uC785(\uD734\uBA3C \uC778\uD50C\uB8E8\uC5B8\uC11C) / \uCF58\uD150\
    \uCE20(\uD050\uB808\uC774\uC158/\uC5D0\uB514\uD1A0\uB9AC\uC5BC) / \uBD84\uC57C\
    (\uD478\uB4DC) / \uBB34\uB4DC(\uAC10\uC131\uC801) / \uCD9C\uC5F0(\uC5BC\uAD74\
    \ \uC911\uC2EC) / \uD0DC\uADF8(\uAC10\uC131\uCE74\uD398) / \uC815\uB82C(\uD53C\
    \uB4DC \uC778\uAC8C\uC774\uC9C0\uBA3C\uD2B8 \uB192\uC740 \uC21C)\n\uD0C0\uC774\
    \uD2C0: \uC5EC\uC6B4\uC744 \uB0A8\uAE30\uB294 \uAC10\uC131\uCE74\uD398 \uBB34\
    \uB4DC \uBBA4\uC988\n\u2192 A: \"\uC5EC\uC6B4\uC744 \uB0A8\uAE30\uB294\" (\uAC10\
    \uC131\uC801) / B: \"\uAC10\uC131\uCE74\uD398 \uBB34\uB4DC\" (tag+field) / C:\
    \ \"\uBBA4\uC988\" (\uD050\uB808\uC774\uC158/\uC5D0\uB514\uD1A0\uB9AC\uC5BC)\n\
    \uC124\uBA85:\n\"\uC5EC\uAE30 \uC5B4\uB514\uC57C?\" \uB313\uAE00\uC774 \uC3DF\
    \uC544\uC9C0\uB294 \uD53C\uB4DC, \uC0C1\uC0C1\uC774 \uB418\uC2DC\uB098\uC694\
    ? 5\uB9CC~10\uB9CC \uB9E4\uD06C\uB85C/\uB300\uD615 \uCCB4\uAE09\uC758 \uAC10\
    \uC131 \uD53C\uB4DC\uAC00 \uB9CC\uB4E4\uC5B4\uB0B4\uB294 \uC800\uC7A5\uB960\uACFC\
    \ \uC790\uBC1C\uC801 \uACF5\uC720\uB294 \uC774\uBBF8 \uAC80\uC99D \uC644\uB8CC\
    \uC785\uB2C8\uB2E4.\n\n\uC5BC\uAD74 \uD558\uB098\uB85C \uACF5\uAC04\uC758 \uC628\
    \uB3C4\uAE4C\uC9C0 \uC804\uD558\uB294 \uD734\uBA3C \uC778\uD50C\uB8E8\uC5B8\uC11C\
