<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유광기 — 관리자 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#FAFAFA;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:380px;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center}
.login-logo{font-size:28px;font-weight:900;color:#FF6B35;margin-bottom:8px}
.login-sub{font-size:13px;color:#888;margin-bottom:32px}
.login-field{width:100%;padding:12px 16px;border:1px solid #eee;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;transition:border-color .2s}
.login-field:focus{border-color:#FF6B35}
.login-btn{width:100%;padding:14px;background:#FF6B35;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:8px}
.login-btn:hover{background:#E55A2B}
.login-error{color:#E53935;font-size:12px;margin-bottom:12px}
</style>
</head>
<body>
<form class="login-box" method="POST">
  <div class="login-logo">유광기</div>
  <div class="login-sub">관리자 로그인</div>
  {% if error %}
  <div class="login-error">{{ error }}</div>
  {% endif %}
  <input class="login-field" type="text" name="uid" placeholder="아이디" required>
  <input class="login-field" type="password" name="pw" placeholder="비밀번호" required>
  <button class="login-btn" type="submit">로그인</button>
</form>
</body>
</html>
