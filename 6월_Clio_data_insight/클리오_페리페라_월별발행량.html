<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클리오 vs 페리페라 월별 발행량 (2026년 3~6월)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
    background:#ffffff; color:#1a1a1a;
    display:flex; justify-content:center; padding:48px 24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{ width:100%; max-width:920px; }
  .head{ text-align:center; margin-bottom:14px; }
  .head .eyebrow{ font-size:13px; letter-spacing:.08em; color:#3b82f6; font-weight:600; }
  .head h1{ font-size:23px; font-weight:700; margin-top:8px; letter-spacing:-.02em; }
  .badge{ display:inline-block; margin-top:12px; padding:4px 12px; border-radius:999px;
          background:#fff4e5; color:#c2710c; font-size:12px; font-weight:600; }
  .chart-wrap{ position:relative; height:480px; margin-top:18px; }
  .foot{ margin-top:24px; font-size:11.5px; color:#aeb4bd; line-height:1.7; text-align:center; }
  .foot b{ color:#8a8f98; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="eyebrow">CLIO vs PERIPERA · 2026 상반기</div>
    <h1>클리오 vs 페리페라 월별 발행량 (YT + IG)</h1>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="foot">
    <b>발행량</b> = 해당 월 브랜드 제품을 언급한 고유 영상/게시물 수 ·
    막대 = 브랜드별, 색 = 채널(YT/IG) · YouTube 영상 발행일 / Instagram 게시일 기준
  </div>
</div>

<script>
  Chart.register(ChartDataLabels);

  const labels = ["2026-03","2026-04","2026-05","2026-06"];

  // 클리오 (실제 데이터)
  const clio = { yt:[259,85,151,169], ig:[92,71,138,63] };
  // 페리페라 (실제 데이터)
  const peri = { yt:[209,96,108,198], ig:[133,61,153,147] };

  // 색: YT=블루 계열, IG=그린 계열 / 클리오=진하게, 페리페라=연하게
  const C = {
    clioYT:'#3f6fae', clioIG:'#2a8f6c',   // 클리오 (진한 블루 / 진한 그린)
    periYT:'#a9c2e2', periIG:'#9fd6bd',   // 페리페라 (연한 블루 / 연한 그린)
  };

  const clioTotal = clio.yt.map((v,i)=>v+clio.ig[i]);
  const periTotal = peri.yt.map((v,i)=>v+peri.ig[i]);

  new Chart(document.getElementById('chart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'클리오 · YT', data:clio.yt, backgroundColor:C.clioYT, stack:'CLIO',
          datalabels:{display:false} },
        { label:'클리오 · IG', data:clio.ig, backgroundColor:C.clioIG, stack:'CLIO',
          borderRadius:{topLeft:4,topRight:4},
          datalabels:{ display:true, anchor:'end', align:'end', offset:2,
            color:'#274d3c', font:{size:13,weight:'700'},
            formatter:(v,ctx)=>clioTotal[ctx.dataIndex] } },
        { label:'페리페라 · YT', data:peri.yt, backgroundColor:C.periYT, stack:'PERI',
          datalabels:{display:false} },
        { label:'페리페라 · IG', data:peri.ig, backgroundColor:C.periIG, stack:'PERI',
          borderRadius:{topLeft:4,topRight:4},
          datalabels:{ display:true, anchor:'end', align:'end', offset:2,
            color:'#5a7e6c', font:{size:13,weight:'700'},
            formatter:(v,ctx)=>periTotal[ctx.dataIndex] } },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top:24 } },
      scales:{
        x:{ stacked:true, grid:{display:false},
            ticks:{ font:{size:13, weight:'600'}, color:'#6b7280' } },
        y:{ stacked:true, beginAtZero:true,
            title:{ display:true, text:'발행건수 (고유)', font:{size:12}, color:'#9aa1ab' },
            grid:{ color:'#f0f1f3' }, border:{display:false},
            ticks:{ color:'#aeb4bd', font:{size:11} } },
      },
      plugins:{
        legend:{ position:'top', align:'end',
          labels:{ usePointStyle:true, pointStyle:'rectRounded', boxWidth:12, boxHeight:12,
                   padding:14, font:{size:12.5, weight:'600'}, color:'#4b5563' } },
        tooltip:{ callbacks:{ label:(c)=>`${c.dataset.label}: ${c.parsed.y}건` } },
      }
    }
  });
</script>
</body>
</html>
