<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클리오 vs 페리페라 월별 발행량 (로고 버전)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
    background:#ffffff; color:#1a1a1a;
    display:flex; justify-content:center; padding:48px 24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{ width:100%; max-width:920px; }
  .head{ text-align:center; margin-bottom:18px; }
  .head .eyebrow{ font-size:13px; letter-spacing:.08em; color:#3b82f6; font-weight:600; }
  .head h1{ font-size:23px; font-weight:700; margin-top:8px; letter-spacing:-.02em; }

  /* 커스텀 범례 */
  .legend{ display:flex; justify-content:center; gap:22px; flex-wrap:wrap; margin-top:16px;
           font-size:13px; font-weight:600; color:#4b5563; }
  .legend .item{ display:flex; align-items:center; gap:7px; }
  .legend .swatch{ width:14px; height:14px; border-radius:4px; }
  .legend .ic{ width:18px; height:18px; }
  .legend .sep{ width:1px; background:#e5e7eb; }

  .chart-wrap{ position:relative; height:480px; margin-top:6px; }
  .foot{ margin-top:24px; font-size:11.5px; color:#aeb4bd; line-height:1.7; text-align:center; }
  .foot b{ color:#8a8f98; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="eyebrow">CLIO vs PERIPERA · 2026 상반기</div>
    <h1>클리오 vs 페리페라 월별 발행량</h1>
    <div class="legend">
      <div class="item"><span class="swatch" style="background:#4a5fc1"></span>클리오</div>
      <div class="item"><span class="swatch" style="background:#ef8aa3"></span>페리페라</div>
      <div class="sep"></div>
      <div class="item"><img class="ic" id="legYT">YouTube</div>
      <div class="item"><img class="ic" id="legIG">Instagram</div>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="foot">
    <b>발행량</b> = 해당 월 브랜드 제품을 언급한 고유 영상/게시물 수 ·
    막대 색 = 브랜드, 막대 안 로고 = 채널(YT/IG) · 막대 위 숫자 = YT+IG 합계
  </div>
</div>

<script>
  Chart.register(ChartDataLabels);

  const labels = ["2026-03","2026-04","2026-05","2026-06"];
  const clio = { yt:[259,85,151,169], ig:[92,71,138,63] };   // 실제
  const peri = { yt:[209,96,108,198], ig:[133,61,153,147] }; // 실제
  const clioTotal = clio.yt.map((v,i)=>v+clio.ig[i]);
  const periTotal = peri.yt.map((v,i)=>v+peri.ig[i]);

  const clioC='#4a5fc1', periC='#ef8aa3';   // 브랜드 색

  // ── 채널 로고(인라인 SVG) ──
  const ytSvg = "<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path fill='#FF0000' d='M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z'/><path fill='#fff' d='M9.6 15.6V8.4l6.2 3.6z'/></svg>";
  const igSvg = "<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='#E1306C' stroke-width='2'><rect x='2' y='2' width='20' height='20' rx='5.5'/><circle cx='12' cy='12' r='4.5'/><circle cx='17.5' cy='6.5' r='1.3' fill='#E1306C' stroke='none'/></svg>";
  const toURL = s => 'data:image/svg+xml;utf8,'+encodeURIComponent(s);
  const ytImg = new Image(); ytImg.src = toURL(ytSvg);
  const igImg = new Image(); igImg.src = toURL(igSvg);
  document.getElementById('legYT').src = ytImg.src;
  document.getElementById('legIG').src = igImg.src;

  // ── 막대 세그먼트 안에 로고 그리는 커스텀 플러그인 ──
  const logoPlugin = {
    id:'logoInSeg',
    afterDatasetsDraw(chart){
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds,di)=>{
        const img = ds.channel==='yt' ? ytImg : igImg;
        if(!img.complete || !img.naturalWidth) return;
        chart.getDatasetMeta(di).data.forEach(bar=>{
          const top=bar.y, base=bar.base, h=Math.abs(base-top);
          if(h<24) return;
          const cx=bar.x, cy=(top+base)/2;
          const r=Math.min(12, h/2-4, bar.width/2-3);
          if(r<7) return;
          ctx.save();
          ctx.beginPath(); ctx.arc(cx,cy,r+3.5,0,Math.PI*2);
          ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,.18)'; ctx.shadowBlur=3; ctx.fill();
          ctx.restore();
          ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
        });
      });
    }
  };
  Chart.register(logoPlugin);

  const seam = { borderColor:'#ffffff', borderWidth:{top:2.5}, borderSkipped:false };

  const chart = new Chart(document.getElementById('chart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'클리오·YT', data:clio.yt, backgroundColor:clioC, stack:'CLIO', channel:'yt',
          ...seam, datalabels:{display:false} },
        { label:'클리오·IG', data:clio.ig, backgroundColor:clioC, stack:'CLIO', channel:'ig',
          borderRadius:{topLeft:5,topRight:5},
          datalabels:{ display:true, anchor:'end', align:'end', offset:3,
            color:'#2f3d8a', font:{size:13,weight:'700'},
            formatter:(v,ctx)=>clioTotal[ctx.dataIndex] } },
        { label:'페리페라·YT', data:peri.yt, backgroundColor:periC, stack:'PERI', channel:'yt',
          ...seam, datalabels:{display:false} },
        { label:'페리페라·IG', data:peri.ig, backgroundColor:periC, stack:'PERI', channel:'ig',
          borderRadius:{topLeft:5,topRight:5},
          datalabels:{ display:true, anchor:'end', align:'end', offset:3,
            color:'#c25575', font:{size:13,weight:'700'},
            formatter:(v,ctx)=>periTotal[ctx.dataIndex] } },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top:24 } },
      scales:{
        x:{ stacked:true, grid:{display:false},
            ticks:{ font:{size:13, weight:'600'}, color:'#6b7280' } },
        y:{ stacked:true, beginAtZero:true,
            title:{ display:true, text:'발행건수 (고유)', font:{size:12}, color:'#9aa1ab' },
            grid:{ color:'#f0f1f3' }, border:{display:false},
            ticks:{ color:'#aeb4bd', font:{size:11} } },
      },
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{ label:(c)=>`${c.dataset.label}: ${c.parsed.y}건` } },
      }
    }
  });

  // 로고 로드되면 다시 그리기
  ytImg.onload = ()=>chart.update('none');
  igImg.onload = ()=>chart.update('none');
</script>
</body>
</html>
